<!doctype html>
<html lang="en" dir="ltr" id="htmlRoot">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kanz</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230f1411'/%3E%3Cg transform='translate(50,50)'%3E%3Cpolygon points='0,-42 42,0 0,42 -42,0' fill='none' stroke='%23d4af37' stroke-width='2.5' stroke-linejoin='round'/%3E%3Cpolygon points='0,-30 30,0 0,30 -30,0' fill='none' stroke='%238a7430' stroke-width='1' stroke-linejoin='round'/%3E%3Ctext x='-1' y='8' text-anchor='end' font-family='monospace' font-size='22' font-weight='700' fill='%23f0d878'%3EK%3C/text%3E%3Ctext x='1' y='7' text-anchor='start' font-family='monospace' font-size='10' font-weight='700' fill='%23f0d878'%3EANZ%3C/text%3E%3C/g%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--wt-bg)}
::-webkit-scrollbar-thumb{background:var(--wt-line-strong);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--wt-gold-dim)}

.wt-body{
  /* ── الوضع الغامق (افتراضي) ── */
  --wt-bg:#0f1411;--wt-panel:#161d19;--wt-panel-2:#1c2521;
  --wt-line:rgba(212,201,165,.14);--wt-line-strong:#3a4540;
  --wt-gold:#d4af37;--wt-gold-light:#f0d878;--wt-gold-dim:#8a7430;
  --wt-text:#f3efe2;--wt-text-dim:#9aa39a;
  --wt-green:#5fae6e;--wt-red:#d9695f;--wt-radius:14px;
  --wt-bg-gradient:radial-gradient(ellipse at top,#182019 0%,#0f1411 60%);
  --wt-hero-gradient:linear-gradient(155deg,var(--wt-panel) 0%,var(--wt-panel-2) 100%);
  --wt-input-bg:var(--wt-panel-2);
  --wt-bar-track:rgba(255,255,255,.07);
  --wt-chart-empty:#2a2a2a;
  scrollbar-width:thin;scrollbar-color:var(--wt-line-strong) var(--wt-bg);
  min-height:100vh;background:var(--wt-bg-gradient);
  color:var(--wt-text);font-family:"Tajawal",sans-serif;padding:32px 16px 64px;
  transition:background .25s ease,color .25s ease;
}
.wt-body.theme-light{
  --wt-bg:#f6f4ee;--wt-panel:#ffffff;--wt-panel-2:#f0ede3;
  --wt-line:rgba(60,50,20,.12);--wt-line-strong:#d8d2c0;
  --wt-gold:#b8902c;--wt-gold-light:#9c7a1f;--wt-gold-dim:#c7ab5e;
  --wt-text:#2a2620;--wt-text-dim:#6b6358;
  --wt-green:#3f8f51;--wt-red:#c14a3f;
  --wt-bg-gradient:radial-gradient(ellipse at top,#fffdf8 0%,#f6f4ee 60%);
  --wt-hero-gradient:linear-gradient(155deg,#fffdf8 0%,#f0ede3 100%);
  --wt-input-bg:#ffffff;
  --wt-bar-track:rgba(0,0,0,.06);
  --wt-chart-empty:#e4e0d4;
}
.wt-wrap{max-width:880px;margin:0 auto}
.wt-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:28px}
.wt-top-right{display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.wt-top-row{display:flex;align-items:center;gap:8px}
.wt-eyebrow{font-size:12px;letter-spacing:.12em;color:var(--wt-gold-dim);text-transform:uppercase;margin:0 0 6px}
.wt-logo{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.wt-logo-mark{width:72px;height:72px;flex-shrink:0}
.wt-logo-mark.wt-logo-animate{opacity:0;transform:scale(.6) rotate(-15deg);animation:wt-logo-in .6s cubic-bezier(.2,.9,.3,1.3) forwards}
@keyframes wt-logo-in{to{opacity:1;transform:scale(1) rotate(0deg)}}
.wt-logo .wt-eyebrow{margin:0}
.wt-h1{font-size:28px;font-weight:900;margin:0;color:var(--wt-text);letter-spacing:-.01em}
.wt-sub{color:var(--wt-text-dim);font-size:14px;margin:6px 0 0}
.wt-status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--wt-text-dim);background:var(--wt-panel);border:1px solid var(--wt-line);border-radius:999px;padding:7px 14px}
.wt-dot{width:7px;height:7px;border-radius:50%;background:var(--wt-text-dim);transition:.3s;display:inline-block}
.wt-dot.live{background:var(--wt-green);box-shadow:0 0 8px var(--wt-green)}
.wt-dot.err{background:var(--wt-red);box-shadow:0 0 8px var(--wt-red)}
.wt-dot.loading{background:var(--wt-gold);animation:wt-pulse 1.1s infinite}
@keyframes wt-pulse{0%,100%{opacity:1}50%{opacity:.35}}
.wt-refresh,.wt-theme-btn{background:var(--wt-panel-2);border:1px solid var(--wt-line);color:var(--wt-text);border-radius:999px;padding:9px 18px;font-family:"Tajawal",sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.2s}
.wt-refresh:hover,.wt-theme-btn:hover{border-color:var(--wt-gold-dim);color:var(--wt-gold-light)}
.wt-refresh:active,.wt-theme-btn:active{transform:scale(.97)}
.wt-refresh:disabled{opacity:.7;cursor:wait}
.wt-refresh svg,.wt-theme-btn svg{width:14px;height:14px}
.wt-theme-btn{padding:9px 12px}
.wt-spin{animation:wt-spin .9s linear infinite}
@keyframes wt-spin{to{transform:rotate(360deg)}}
.wt-hero{background:var(--wt-hero-gradient);border:1px solid var(--wt-line);border-radius:var(--wt-radius);padding:32px;margin-bottom:24px;position:relative;overflow:hidden}
.wt-hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 85% -10%,rgba(212,175,55,.16),transparent 55%);pointer-events:none}
.wt-hero-label{font-size:13px;color:var(--wt-text-dim);margin:0 0 10px;position:relative}
.wt-hero-value{font-family:"JetBrains Mono",monospace;font-size:clamp(36px,7vw,56px);font-weight:500;color:var(--wt-gold-light);margin:0;line-height:1;position:relative;direction:ltr;text-align:right;unicode-bidi:plaintext}
.wt-hero-meta{display:flex;gap:24px;flex-wrap:wrap;margin-top:18px;position:relative;font-size:13px;color:var(--wt-text-dim)}
.wt-hero-meta b{color:var(--wt-text);font-family:"JetBrains Mono",monospace;font-weight:500}
.wt-growth-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;position:relative}
.wt-growth-chip{display:flex;flex-direction:column;gap:2px;font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:600;direction:ltr}
.wt-growth-sub{font-family:"Tajawal",sans-serif;font-size:11px;font-weight:400;opacity:.85;direction:rtl;unicode-bidi:plaintext}
.wt-goal-bar-wrap{margin-top:16px;position:relative}
.wt-goal-bar-track{height:10px;border-radius:5px;background:var(--wt-bar-track);overflow:hidden}
.wt-goal-bar-fill{height:100%;background:linear-gradient(90deg,var(--wt-gold-dim),var(--wt-gold));border-radius:5px;transition:width .4s ease}
.wt-goal-bar-label{font-size:12px;color:var(--wt-text-dim);margin-top:6px;font-family:"JetBrains Mono",monospace;direction:ltr;text-align:right}
.wt-rates{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.wt-rate-card{background:var(--wt-panel);border:1px solid var(--wt-line);border-radius:var(--wt-radius);padding:14px 16px}
.wt-rl{font-size:12px;color:var(--wt-text-dim);margin:0 0 4px}
.wt-rv{font-family:"JetBrains Mono",monospace;font-size:18px;font-weight:500;margin:0;direction:ltr;text-align:right;color:var(--wt-text)}
.wt-table-wrap{background:var(--wt-panel);border:1px solid var(--wt-line);border-radius:var(--wt-radius);padding:20px 18px;margin-bottom:24px}
.wt-table-title{font-size:14px;color:var(--wt-text-dim);margin:0;font-weight:500}
.wt-table{width:100%;border-collapse:collapse}
.wt-table thead th{text-align:start;font-size:12px;color:var(--wt-text-dim);font-weight:500;padding:0 10px 10px;border-bottom:1px solid var(--wt-line)}
.wt-table thead th.num{text-align:end}
.wt-table tbody td{padding:14px 10px;border-bottom:1px solid var(--wt-line);font-size:15px;vertical-align:middle}
.wt-table tbody tr:last-child td{border-bottom:none}
.wt-asset-name{display:flex;align-items:center;gap:10px;font-weight:500}
.wt-category-badge{border:1px solid var(--wt-line);background:transparent;border-radius:999px;padding:2px 9px;font-size:10px;font-family:"Tajawal",sans-serif;cursor:pointer;white-space:nowrap;transition:.15s;margin-inline-start:auto}
.wt-category-badge.is-cash{color:var(--wt-text-dim)}
.wt-category-badge.is-cash:hover{border-color:var(--wt-green);color:var(--wt-green)}
.wt-category-badge.is-asset{color:var(--wt-red);border-color:var(--wt-red)}
.wt-category-badge.is-asset:hover{opacity:.75}
.wt-asset-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.wt-asset-icon-bg{background:var(--wt-input-bg);color:var(--wt-text)}
.wt-qty{width:100%;max-width:120px;background:var(--wt-input-bg);border:1px solid var(--wt-line);color:var(--wt-text);border-radius:8px;padding:8px 10px;font-family:"JetBrains Mono",monospace;font-size:14px;text-align:left;direction:ltr}
.wt-qty:focus{outline:none;border-color:var(--wt-gold-dim)}
.wt-price-cell{font-family:"JetBrains Mono",monospace;color:var(--wt-text-dim);font-size:13px;text-align:left;direction:ltr}
.wt-total-cell{font-family:"JetBrains Mono",monospace;font-weight:500;text-align:left;direction:ltr;color:var(--wt-text)}
.wt-footer-note{font-size:12px;color:var(--wt-text-dim);line-height:1.8;text-align:start;border-top:1px solid var(--wt-line);padding-top:16px;margin-top:8px}
.wt-table-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.wt-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.wt-btn{background:var(--wt-gold);color:#1a1208;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.wt-btn:hover{opacity:.88}
.wt-btn-ghost{background:transparent;color:var(--wt-text-dim);border:1px solid var(--wt-line)}
.wt-btn-ghost:hover{color:var(--wt-text);border-color:var(--wt-gold-dim)}
.wt-btn-add{background:transparent;border:1.5px dashed var(--wt-gold-dim);color:var(--wt-gold-light);border-radius:8px;width:32px;height:32px;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.wt-btn-add:hover{background:rgba(212,175,55,.1);border-style:solid}
.wt-th-order{width:56px}
.wt-th-del{width:64px}
.wt-order-btns{display:inline-flex;flex-direction:column;gap:2px}
.wt-ord{background:var(--wt-input-bg);border:1px solid var(--wt-line);color:var(--wt-text-dim);width:26px;height:18px;line-height:1;font-size:9px;border-radius:4px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center}
.wt-ord:hover:not(:disabled){color:var(--wt-gold-light);border-color:var(--wt-gold-dim)}
.wt-ord:disabled{opacity:.3;cursor:not-allowed}
.wt-del{background:transparent;border:none;color:var(--wt-text-dim);width:26px;height:26px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.wt-del:hover{color:var(--wt-red);background:rgba(217,105,95,.1)}
.wt-edit{background:transparent;border:none;color:var(--wt-text-dim);width:26px;height:26px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.wt-edit:hover{color:var(--wt-gold-light);background:rgba(212,175,55,.1)}
.wt-edit svg,.wt-del svg{width:14px;height:14px}
.wt-row-actions{display:flex;gap:2px;align-items:center;justify-content:center}
.wt-icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:4px}
.wt-icon-opt{background:var(--wt-input-bg);border:1px solid var(--wt-line);border-radius:8px;font-size:18px;line-height:1;padding:8px 0;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center}
.wt-icon-opt:hover{border-color:var(--wt-gold-dim)}
.wt-icon-opt.selected{border-color:var(--wt-gold);background:rgba(212,175,55,.14);box-shadow:0 0 0 1px var(--wt-gold)}
/* Breakdown */
.wt-breakdown{background:var(--wt-panel);border:1px solid var(--wt-line);border-radius:var(--wt-radius);padding:22px 24px;margin-bottom:24px}
.wt-bk-title{font-size:13px;color:var(--wt-text-dim);margin:0 0 20px;font-weight:400}
.wt-bk-body{display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap}
.wt-bk-donuts{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.wt-bk-donut-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.wt-bk-donut-lbl{font-size:11px;color:var(--wt-text-dim);text-align:center}
.wt-bk-donut-wrap{position:relative}
.wt-bk-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:80px}
.wt-bk-center-val{font-family:"JetBrains Mono",monospace;font-size:16px;font-weight:500;color:var(--wt-gold-light);display:block;direction:ltr}
.wt-bk-center-sub{font-size:10px;color:var(--wt-text-dim);display:block;margin-top:2px}
.wt-bk-right{flex:1;min-width:180px;display:flex;flex-direction:column;gap:18px}
.wt-bk-leg{display:flex;flex-direction:column;gap:8px}
.wt-bk-leg-title{font-size:11px;color:var(--wt-text-dim);margin:0 0 4px;letter-spacing:.05em;text-transform:uppercase}
.wt-bk-leg-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--wt-text-dim)}
.wt-bk-leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.wt-bk-leg-name{flex:1}
.wt-bk-leg-val{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--wt-text);direction:ltr}
.wt-bk-bars{display:flex;flex-direction:column;gap:7px}
.wt-bk-bar-row{display:flex;align-items:center;gap:8px;font-size:12px}
.wt-bk-bar-name{width:70px;color:var(--wt-text-dim);text-align:start;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wt-bk-bar-track{flex:1;height:8px;border-radius:3px;background:var(--wt-bar-track);overflow:hidden}
.wt-bk-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.wt-bk-bar-pct{width:36px;text-align:left;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--wt-text);direction:ltr}
/* Change analysis rows (period breakdown: how much each category moved) */
.wt-change-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:8px}
.wt-change-name{width:88px;color:var(--wt-text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.wt-change-track{flex:1;height:8px;border-radius:3px;background:var(--wt-bar-track);overflow:hidden}
.wt-change-fill{height:100%;border-radius:3px;transition:width .4s ease}
.wt-change-val{width:92px;text-align:left;font-family:"JetBrains Mono",monospace;font-size:11.5px;direction:ltr;flex-shrink:0}
/* Sync badge */
.wt-sync-badge{font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500;transition:all .3s;white-space:nowrap}
.sync-loading,.sync-saving{color:#f0b429;background:rgba(240,180,41,.12)}
.sync-ok{color:var(--wt-green);background:rgba(95,174,110,.12)}
.sync-err{color:var(--wt-red);background:rgba(224,82,82,.12)}
.wt-fx-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap;align-self:flex-end}
.fx-hourly{color:var(--wt-green);background:rgba(95,174,110,.12)}
.fx-daily{color:#f0b429;background:rgba(240,180,41,.12)}
/* Modal لإضافة بند جديد */
.wt-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
/* Auth Screen */
.wt-auth-screen{position:fixed;inset:0;background:var(--wt-bg-gradient);display:flex;align-items:center;justify-content:center;z-index:2000;padding:16px}
.wt-auth-toggles{position:absolute;top:20px;inset-inline-end:20px;display:flex;gap:8px}
.wt-auth-card{background:var(--wt-panel);border:1px solid var(--wt-line);border-radius:var(--wt-radius);padding:36px 32px;width:100%;max-width:360px}
.wt-auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
.wt-auth-logo svg{width:48px;height:48px}
.wt-auth-logo-name{font-family:"JetBrains Mono",monospace;font-size:24px;font-weight:700;color:var(--wt-gold-light);letter-spacing:2px}
.wt-auth-logo-sub{font-family:"Tajawal",sans-serif;font-size:11px;color:var(--wt-gold-dim);letter-spacing:.1em}
.wt-auth-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--wt-line);border-radius:8px;overflow:hidden}
.wt-auth-tab{flex:1;padding:9px;font-family:"Tajawal",sans-serif;font-size:13px;font-weight:500;background:transparent;border:none;color:var(--wt-text-dim);cursor:pointer;transition:.15s}
.wt-auth-tab.active{background:var(--wt-gold);color:#1a1208;font-weight:600}
.wt-auth-err{color:var(--wt-red);font-size:12px;margin:-8px 0 10px;display:none}
.wt-auth-remember{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--wt-text-dim);cursor:pointer;margin:2px 0 14px;user-select:none}
.wt-auth-remember input[type=checkbox]{width:16px;height:16px;accent-color:var(--wt-gold);cursor:pointer;flex-shrink:0}
.wt-auth-btn{width:100%;background:var(--wt-gold);color:#1a1208;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:"Tajawal",sans-serif;margin-top:6px;transition:opacity .15s}
.wt-auth-btn:hover{opacity:.88}
.wt-auth-btn:disabled{opacity:.6;cursor:wait}
.wt-logout-btn{background:transparent;border:1px solid var(--wt-line);color:var(--wt-text-dim);border-radius:999px;padding:7px 14px;font-family:"Tajawal",sans-serif;font-size:12px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.wt-logout-btn:hover{border-color:var(--wt-red);color:var(--wt-red)}
.wt-user-badge{font-size:12px;color:var(--wt-gold-dim);font-family:"JetBrains Mono",monospace;padding:7px 12px;background:var(--wt-panel);border:1px solid var(--wt-line);border-radius:999px}
.wt-modal{background:var(--wt-panel);border:1px solid var(--wt-line);border-radius:var(--wt-radius);padding:20px 22px;width:100%;max-width:360px}
.wt-modal h3{margin:0 0 14px;font-size:15px;color:var(--wt-text)}
.wt-field{margin-bottom:12px}
.wt-field label{display:block;font-size:12px;color:var(--wt-text-dim);margin-bottom:5px}
.wt-field input[type=text],.wt-field input[type=password],.wt-field select{width:100%;background:var(--wt-input-bg);border:1px solid var(--wt-line);color:var(--wt-text);border-radius:8px;padding:9px 12px;font-family:"Tajawal",sans-serif;font-size:14px}
.wt-field input[type=text]:focus,.wt-field input[type=password]:focus,.wt-field select:focus{outline:none;border-color:var(--wt-gold-dim)}
.wt-modal-actions{display:flex;gap:8px;margin-top:12px}
.wt-modal-actions .wt-btn,.wt-modal-actions .wt-btn-ghost{flex:1;text-align:center;padding:9px}
/* Historical snapshot modal — نسخة أحلى بكروت ملونة لكل فئة، شبكة عمودين مضغوطة */
.wt-hist-modal{max-width:600px;max-height:94vh;overflow-y:auto;padding:16px 18px}
.wt-hist-modal h3{margin-bottom:4px}
.wt-hist-rate-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:999px;margin-top:6px;font-family:"JetBrains Mono",monospace;transition:.2s}
.wt-hist-rate-badge:empty{display:none}
.wt-hist-rate-badge.loading{color:#f0b429;background:rgba(240,180,41,.12)}
.wt-hist-rate-badge.ok{color:var(--wt-green);background:rgba(95,174,110,.12)}
.wt-hist-rate-badge.error{color:var(--wt-red);background:rgba(224,82,82,.12);font-family:"Tajawal",sans-serif;font-size:10.5px}
.wt-hist-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.wt-hist-card{background:var(--wt-input-bg);border:1px solid var(--wt-line);border-inline-start:3px solid var(--wt-line-strong);border-radius:9px;padding:8px 10px}

.wt-hist-card.c-hard{border-inline-start-color:#4a8fdb}
.wt-hist-card.c-gold{border-inline-start-color:#d4af37}
.wt-hist-card.c-assets{border-inline-start-color:#d9695f}
.wt-hist-card-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.wt-hist-card-icon{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;background:var(--wt-panel-2);flex-shrink:0}
.wt-hist-card-titles{display:flex;flex-direction:column;gap:0;min-width:0}
.wt-hist-card-title{font-size:11.5px;font-weight:700;color:var(--wt-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.25}
.wt-hist-card-hint{font-size:9px;color:var(--wt-text-dim);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wt-hist-card input[type=number]{width:100%;background:var(--wt-panel-2);border:1px solid var(--wt-line);color:var(--wt-text);border-radius:7px;padding:6px 8px;font-family:"JetBrains Mono",monospace;font-size:12.5px;direction:ltr;text-align:left}
.wt-hist-card input[type=number]:focus{outline:none;border-color:var(--wt-gold-dim)}
.wt-hist-preview{font-size:10.5px;color:var(--wt-text-dim);margin-top:5px;min-height:13px;line-height:1.25}
.wt-hist-preview b{color:var(--wt-gold-light);font-family:"JetBrains Mono",monospace;font-weight:500}
.wt-hist-row2{display:flex;gap:5px}

 *    الجهاز ده لمدة 7 أيام من غير ما يكتب الباسورد كل مرة. التوكن ده
 *    عشوائي طويل، وبيتوصل بيه السيرفر عن طريق مقارنة الـ hash بتاعه فقط
 *    (زي الباسورد بالظبط) — النص الصريح للتوكن مش بيتخزن في السيرفر خالص.
 * كل تفضيل تاني (theme/lang/order/بنود/كميات) بييجي من السيرفر مع كل تحميل.
 */

function slugify(s) {
  return String(s).trim().toLowerCase()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/(^-+|-+$)/g, "") || "item";
}

function rebuildAssets() {
  const baseFull = BASE_ASSETS
    .filter(b => !excludedBaseIds.has(b.id))
    .map(b => {
      const ov = baseOverrides[b.id];
      return ov ? { ...b, ...ov } : b;
    });
  const customFull = customAssets.map(c => ({
    id: c.id,
    name_ar: c.name_ar,
    name_en: c.name_en,
    icon: c.icon || "💼",
    currency: c.currency,
    isAsset: !!c.isAsset,
  }));
  ASSETS = [...baseFull, ...customFull];
  ASSETS.forEach(a => { if (!(a.id in qty)) qty[a.id] = 0; });
}

function syncOrderWithAssets() {
  const known   = order.filter(id => ASSETS.some(a => a.id === id));
  const missing = ASSETS.map(a => a.id).filter(id => !known.includes(id));
  order = [...known, ...missing];
}

function applyTheme() {
  const el = document.getElementById("bodyRoot");
  if (theme === "light") el.classList.add("theme-light");
  else el.classList.remove("theme-light");
}

function toggleTheme() {
  theme = theme === "dark" ? "light" : "dark";
  applyTheme();
  render();
  renderHistory();
  scheduleSave();
}

// بيضيف عدد أيام لتاريخ (YYYY-MM-DD) بالتوقيت المحلي، من غير ما يمر بـ
// toISOString() اللي بتحوّل لـ UTC وممكن ترجّع يوم غلط حسب فرق التوقيت
// (مثلًا توقيت مصر UTC+2/+3 بيخلي toISOString ترجع يوم قبل اللي متوقّع)
function addDaysToDateStr(dateStr, days) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d); // تاريخ محلي صريح، من غير أي غموض توقيت
  dt.setDate(dt.getDate() + days);
  const yyyy = dt.getFullYear();
  const mm = String(dt.getMonth() + 1).padStart(2, "0");
  const dd = String(dt.getDate()).padStart(2, "0");
  return yyyy + "-" + mm + "-" + dd;
}

function priceFor(a) {
  if (!rates) return 0;
  switch (a.currency) {
    case "USD":  return 1;
    case "EGP":  return 1 / rates.egpPerUsd;
    case "EUR":  return 1 / rates.eurPerUsd;
    case "SAR":  return 1 / rates.sarPerUsd;
    case "GOLD": return rates.goldUsdPerGram;
  }
  return 0;
}

// ── إيجاد أقرب لقطة مرجعية لفترة زمنية معيّنة (بالأيام) ──
// نفس منطق "أقدم لقطة جوه النافذة، وإلا أقرب لقطة قبلها" — بنستخدمها في
// حساب نسبة النمو وفي فلترة الرسم البياني، عشان الاتنين يفضلوا متطابقين
function getGrowthCandidate(days) {
  if (!historyData || historyData.length === 0) return null;

  const windowStart = new Date();
  windowStart.setDate(windowStart.getDate() - days);
  const windowStartStr = windowStart.toISOString().slice(0, 10);

  let candidate = historyData.find(h => h.date >= windowStartStr) || null;
  if (!candidate) {
    for (let i = historyData.length - 1; i >= 0; i--) {
      if (historyData[i].date < windowStartStr) { candidate = historyData[i]; break; }
    }
  }
  return candidate;
}

// ── حساب نسبة التغيير مقابل أقرب لقطة قبل N يوم ─────────
function computeGrowth(days, currentTotal) {
  const candidate = getGrowthCandidate(days);
  if (!candidate || candidate.totalUsd === 0) return null;

  const diff = currentTotal - candidate.totalUsd;
  const pct  = (diff / candidate.totalUsd) * 100;
  return { diff, pct };
}

// ── حساب نسبة التغيير منذ تاريخ ثابت (زي بداية السنة) ───
// بيدور على أقرب لقطة بتاريخ >= sinceDate (الأقرب لتاريخ البداية)
function computeGrowthSince(sinceDate, currentTotal) {
  if (!historyData || historyData.length === 0) return null;

  let candidate = null;
  for (let i = 0; i < historyData.length; i++) {
    if (historyData[i].date >= sinceDate) { candidate = historyData[i]; break; }
  }
  // لو كل اللقطات قبل تاريخ البداية، مفيش نقطة مرجعية صالحة
  if (!candidate || candidate.totalUsd === 0) return null;

  const diff = currentTotal - candidate.totalUsd;
  const pct  = (diff / candidate.totalUsd) * 100;
  return { diff, pct };
}

// ── حساب نسبة التغيير منذ أقدم لقطة مسجّلة في السجل كله ──
function computeGrowthAllTime(currentTotal) {
  if (!historyData || historyData.length === 0) return null;
  const candidate = historyData[0]; // historyData متسورتة تصاعديًا حسب التاريخ
  if (!candidate || candidate.totalUsd === 0) return null;

  const diff = currentTotal - candidate.totalUsd;
  const pct  = (diff / candidate.totalUsd) * 100;
  return { diff, pct };
}

// ── جلب أسعار العملات: مصدر ساعي أولاً، ولو فشل نرجع لليومي ─
async function fetchFxRates() {
  // المصدر الأساسي: تحديث كل ساعة (api.exchangerate.fun)
  try {
    const res = await fetch("https://api.exchangerate.fun/latest?base=USD");
    const j   = await res.json();
    if (j && j.rates && j.rates.EGP && j.rates.EUR && j.rates.SAR) {
      return { egpPerUsd: j.rates.EGP, eurPerUsd: j.rates.EUR, sarPerUsd: j.rates.SAR, source: "hourly" };
    }
    throw new Error("بيانات ناقصة من المصدر الساعي");
  } catch(e) {
    console.warn("fetchFxRates: المصدر الساعي فشل، رجوع للمصدر اليومي:", e);
  }
  // مصدر احتياطي: تحديث يومي (open.er-api.com)
  const res = await fetch("https://open.er-api.com/v6/latest/USD");
  const fx  = await res.json();
  return { egpPerUsd: fx.rates.EGP, eurPerUsd: fx.rates.EUR, sarPerUsd: fx.rates.SAR, source: "daily" };
}

// ── جلب الأسعار من الإنترنت ────────────────────────────
async function fetchRates() {
  status = "loading"; render();
  try {
    const [fx, goldRes] = await Promise.all([
      fetchFxRates(),
      fetch("https://api.gold-api.com/price/XAU"),
    ]);
    const gold = await goldRes.json();
    const ounce = gold.price ?? gold.rate ?? gold.value;
    rates = {
      egpPerUsd:      fx.egpPerUsd,
      eurPerUsd:      fx.eurPerUsd,
      sarPerUsd:      fx.sarPerUsd,
      fxSource:       fx.source,
      goldUsdPerOunce:ounce,
      goldUsdPerGram: ounce / OUNCE_TO_GRAM,
      fetchedAt:      new Date().toISOString(),
    };
    status = "live";
  } catch(e) {
    status = "err";
    console.error("fetchRates:", e);
  }
  render();
  renderBreakdown();
}

//  الاتصال بالـ Backend الجديد (Node.js + Express + PostgreSQL)
//  ─────────────────────────────────────────────────────
//  ده بديل google.script.run القديم. بدل ما نعدّل كل نداء نداء في
//  الكود تحت، بنعمل "shim" بنفس الشكل بالظبط (google.script.run
//  .withSuccessHandler().withFailureHandler().functionName(args))
//  فيفضل كل الكود القديم شغال زي ما هو من غير أي تعديل تاني، لكن
//  بدل ما يتصل بجوجل بيتصل بالسيرفر بتاعنا عن طريق REST API عادي.
// ════════════════════════════════════════════════════════

// غيّر الرابط ده لرابط السيرفر بتاعك بعد ما تنشره (Render/Koyeb/إلخ)
const API_BASE = window.KANZ_API_BASE || "https://kanz-r3wzww8n.b4a.run/api/";

// خريطة: اسم الدالة القديمة → طريقة الاتصال الحقيقية بالسيرفر الجديد
const RPC_MAP = {
  signUp:               (u, p)            => ({ method: "POST",   path: "/auth/signup", body: { username: u, password: p } }),
  logIn:                (u, p)            => ({ method: "POST",   path: "/auth/login",  body: { username: u, password: p } }),
  loginWithToken:       (u, tok)          => ({ method: "POST",   path: "/auth/verify", body: { token: tok } }),
  loadDataForClient:    (u, tok)          => ({ method: "GET",    path: "/data", bearer: tok }),
  saveDataFromClient:   (u, qty, ca, ex, ov, th, lg, ord, goal, tok) => ({
    method: "PUT", path: "/data", bearer: tok,
    body: { qty, customAssets: ca, excludedBaseIds: ex, baseOverrides: ov, theme: th, lang: lg, order: ord, savingsGoal: goal },
  }),
  loadHistoryForClient: (u, tok)          => ({ method: "GET",    path: "/history", bearer: tok }),
  addManualHistoryEntry:(u, entry, tok)   => ({ method: "POST",   path: "/history", bearer: tok, body: { entry } }),
  deleteHistoryEntry:   (u, date, tok)    => ({ method: "DELETE", path: "/history", bearer: tok, body: { date } }),
  saveAlertSettings:    (u, settings, tok)=> ({ method: "POST",   path: "/alerts", bearer: tok, body: { settings } }),
  getHistoricalRate:    (dateStr)         => ({ method: "GET",    path: "/historical-rate?date=" + encodeURIComponent(dateStr) }),
  fetchBenchmarkSeries: (from, to)        => ({ method: "GET",    path: "/benchmark?from=" + encodeURIComponent(from) + "&to=" + encodeURIComponent(to) }),
};

async function rpcCall(fnName, args) {
  const build = RPC_MAP[fnName];
  if (!build) throw new Error("Unknown RPC: " + fnName);
  const cfg = build(...args);
  const headers = { "Content-Type": "application/json" };
  if (cfg.bearer) headers["Authorization"] = "Bearer " + cfg.bearer;
  const res = await fetch(API_BASE + cfg.path, {
    method: cfg.method,
    headers,
    body: cfg.method !== "GET" ? JSON.stringify(cfg.body || {}) : undefined,
  });
  return res.json();
}

// شِم بنفس واجهة google.script.run القديمة تمامًا — كل الكود القديم
// اللي بينادي google.script.run.withSuccessHandler(...).withFailureHandler(...).xxx(...)
// هيفضل شغال من غير أي تعديل.
function makeRpcProxy(onSuccess, onFailure) {
  return new Proxy({}, {
    get(_target, fnName) {
      return (...args) => {
        rpcCall(fnName, args).then(onSuccess).catch((err) => { if (onFailure) onFailure(err); });
      };
    },
  });
}

const google = {
  script: {
    run: {
      withSuccessHandler(onSuccess) {
        return { withFailureHandler: (onFailure) => makeRpcProxy(onSuccess, onFailure) };
      },
      withFailureHandler(onFailure) {
        return { withSuccessHandler: (onSuccess) => makeRpcProxy(onSuccess, onFailure) };
      },
    },
  },
};

  if (ev) ev.preventDefault();
  const username = (document.getElementById("auth-username").value || "").trim().toLowerCase();
  const password = document.getElementById("auth-password").value || "";
  const btn      = document.getElementById("auth-submit-btn");
  const errEl    = document.getElementById("auth-err");

  errEl.style.display = "none";
  btn.disabled = true;
  btn.textContent = "…";

  const fn = authMode === "login" ? "logIn" : "signUp";
  google.script.run
    .withSuccessHandler(function(j) {
      btn.disabled = false;
      if (j.ok) {
        completeLogin(j.username, j.token, j.expiresAt);
      } else {
        errEl.textContent = j.error ? t(j.error) : t("genericError");
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = authMode === "login" ? (lang==="en"?"Login":"دخول") : (lang==="en"?"Create account":"إنشاء حساب");
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      errEl.textContent = t("connectionError");
      errEl.style.display = "block";
      btn.textContent = "⚠";
    })
    [fn](username, password);
}

// بيتنادى بعد أي تسجيل دخول/حساب جديد ناجح. بيطلب توكن الجلسة الأول
// وينتظره (await) قبل ما يبدأ يحمّل أي بيانات — عشان نضمن إن كل طلب
// للسيرفر بعد كده يبقى معاه توكن صالح من أول لحظة.
async function completeLogin(username, token, expiresAt) {
  currentUser = username;
  sessionToken = token; // التوكن راجع مباشرة من رد signUp/logIn، مفيش داعي لنداء إضافي للسيرفر
  try { sessionStorage.setItem("kanz_user", currentUser); } catch(e) {}

  const rememberEl = document.getElementById("auth-remember-me");
  const persist = !!(rememberEl && rememberEl.checked);
  if (!persist) {
    try { localStorage.removeItem("kanz_remember"); } catch(e) {}
  } else if (token) {
    try {
      localStorage.setItem("kanz_remember", JSON.stringify({ username: username, token: token, expiresAt: expiresAt }));
    } catch(e) {}
  }

  // إعادة تهيئة كاملة للـ state عشان نتجنب بيانات يوزر سابق
  qty = {}; order = []; customAssets = []; excludedBaseIds = new Set(); baseOverrides = {};
  historyData = []; theme = "dark"; lang = "en"; savingsGoal = 0;
  priceAlertsSettings = { email: "", goldTarget: 0, usdEgpTarget: 0 };
  ASSETS.forEach(a => qty[a.id] = 0);
  render();
  fetchRates();
  sheetsLoad();
  loadHistory();
}

function logout() {
  // JWT توكن ذاتي التحقق (self-verifying) — مفيش حالة محفوظة على السيرفر
  // نلغيها، فمسح النسخة المحلية بس كافي تمامًا.
  currentUser = null;
  sessionToken = null;
  try { sessionStorage.removeItem("kanz_user"); } catch(e) {}
  try { localStorage.removeItem("kanz_remember"); } catch(e) {}
  qty = {}; order = []; customAssets = []; excludedBaseIds = new Set(); baseOverrides = {};
  historyData = []; historyChart = null; outerChart = null; innerChart = null;
  savingsGoal = 0; goalModalOpen = false;
  priceAlertsSettings = { email: "", goldTarget: 0, usdEgpTarget: 0 }; alertsModalOpen = false;
  authMode = "login";
  renderAuth();
}

// ── نظام "تذكرني" (7 أيام) ───────────────────────────────
// بعد أي تسجيل دخول ناجح، بنطلب توكن جديد من السيرفر ونخزّنه في
// localStorage. المرة الجاية اللي المستخدم يفتح فيها الموقع، بنحاول
// نتحقق من التوكن ده تلقائيًا قبل ما نعرض شاشة الدخول خالص.

function attemptAutoLogin() {
  let saved = null;
  try {
    const raw = localStorage.getItem("kanz_remember");
    if (raw) saved = JSON.parse(raw);
  } catch(e) {}

  if (!saved || !saved.username || !saved.token) {
    render(); // مفيش توكن محفوظ — اعرض شاشة الدخول عادي
    return;
  }

  // شاشة تحميل بسيطة لحد ما نتأكد من صلاحية التوكن مع السيرفر
  const appEl = document.getElementById("app");
  if (appEl) {
    appEl.innerHTML = `<div class="wt-auth-screen"><div class="wt-status"><span class="wt-dot loading"></span><span>${t("signingIn")}</span></div></div>`;
  }

  google.script.run
    .withSuccessHandler(function(j) {
      if (j && j.ok) {
        currentUser = j.username;
        sessionToken = saved.token; // نفس التوكن المحفوظ، بما إنه اتأكد إنه صالح دلوقتي
        try { sessionStorage.setItem("kanz_user", currentUser); } catch(e) {}
        qty = {}; order = []; customAssets = []; excludedBaseIds = new Set(); baseOverrides = {};
        historyData = [];
        ASSETS.forEach(a => qty[a.id] = 0);
        render();
        fetchRates();
        sheetsLoad();
        loadHistory();
      } else {
        try { localStorage.removeItem("kanz_remember"); } catch(e) {}
        render();
      }
    })
    .withFailureHandler(function() {
      try { localStorage.removeItem("kanz_remember"); } catch(e) {}
      render();
    })
    .loginWithToken(saved.username, saved.token);
}

// ── تحميل البيانات من الـ Apps Script backend ──────────
// البيانات بترجع كـ: { ok, data, customAssets, excludedBaseIds, baseOverrides }
function sheetsLoad() {
  if (!currentUser) return;
  isLoadingData = true; // منع scheduleSave أثناء التحميل
  syncStatus = "loading"; renderSyncBadge();
  google.script.run
    .withSuccessHandler(function(j) {
      if (j && j.ok) {
        if (Array.isArray(j.customAssets))    customAssets = j.customAssets;
        if (Array.isArray(j.excludedBaseIds)) excludedBaseIds = new Set(j.excludedBaseIds);
        if (j.baseOverrides && typeof j.baseOverrides === "object") baseOverrides = j.baseOverrides;
        if (j.theme === "light" || j.theme === "dark") theme = j.theme;
        if (j.lang === "ar" || j.lang === "en")        lang  = j.lang;
        savingsGoal = (typeof j.savingsGoal === "number") ? j.savingsGoal : 0;
        if (j.priceAlerts) priceAlertsSettings = j.priceAlerts;

        rebuildAssets();
        order = Array.isArray(j.order) && j.order.length ? j.order : ASSETS.map(a => a.id);
        syncOrderWithAssets();

        if (j.data) {
          ASSETS.forEach(a => {
            const v = parseFloat(j.data[a.id]);
            if (!isNaN(v)) qty[a.id] = v;
          });
        }
      }
      isLoadingData = false;
      syncStatus = "synced";
      applyTheme();
      applyLang();
      render();
      renderBreakdown();
    })
    .withFailureHandler(function(err) {
      isLoadingData = false;
      syncStatus = "error";
      console.error("sheetsLoad:", err);
      render();
      renderBreakdown();
    })
    .loadDataForClient(currentUser, sessionToken);
}

// ── حفظ البيانات في الـ Apps Script backend ────────────
function sheetsSave() {
  if (!currentUser) return;
  syncStatus = "saving"; renderSyncBadge();
  const data = {};
  ASSETS.forEach(a => { data[a.id] = qty[a.id] || 0; });
  google.script.run
    .withSuccessHandler(function() {
      syncStatus = "synced";
      renderSyncBadge();
    })
    .withFailureHandler(function(err) {
      syncStatus = "error";
      console.error("sheetsSave:", err);
      renderSyncBadge();
    })
    .saveDataFromClient(currentUser, data, customAssets, [...excludedBaseIds], baseOverrides, theme, lang, order, savingsGoal, sessionToken);
}

let isLoadingData = false; // guard عشان نمنع scheduleSave يشتغل أثناء الـ load

// ── تصدير نسخة احتياطية كاملة (JSON) — أصولك + السجل التاريخي كله ──────
// ملف بسيط تقدر تفتحه بأي محرر نصوص أو تستورده يدويًا لو احتجت، من غير
// أي اعتماد على جوجل شيت
function exportBackup() {
  const backup = {
    exportedAt: new Date().toISOString(),
    username: currentUser,
    assets: ASSETS.map(a => ({
      id: a.id, name_ar: a.name_ar, name_en: a.name_en,
      icon: a.icon, currency: a.currency, isAsset: !!a.isAsset,
      quantity: qty[a.id] || 0,
    })),
    savingsGoal: savingsGoal || 0,
    history: historyData,
  };

  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "kanz-backup-" + (currentUser || "user") + "-" + new Date().toISOString().slice(0, 10) + ".json";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function scheduleSave() {
  if (isLoadingData) return; // مش بنحفظ أثناء تحميل البيانات
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => sheetsSave(), 1200);
}

function renderSyncBadge() {
  const el = document.getElementById("wt-sync-badge");
  if (!el) return;
  const map = {
    idle:    { txt: t("syncIdle"),    cls: "" },
    loading: { txt: t("syncLoading"), cls: "sync-loading" },
    saving:  { txt: t("syncSaving"),  cls: "sync-saving"  },
    synced:  { txt: t("syncOk"),      cls: "sync-ok"      },
    error:   { txt: t("syncErr"),     cls: "sync-err"     },
  };
  const s = map[syncStatus] || map.idle;
  el.innerHTML  = s.txt;
  el.className  = "wt-sync-badge " + s.cls;
}

function submitAddAsset(ev) {
  ev.preventDefault();
  const nameArEl = document.getElementById("new-asset-name-ar");
  const nameEnEl = document.getElementById("new-asset-name-en");
  const curEl    = document.getElementById("new-asset-currency");
  const errEl    = document.getElementById("new-asset-error");
  const nameAr = (nameArEl.value || "").trim();
  const nameEn = (nameEnEl.value || "").trim();
  const currency = curEl.value;

  if (!nameAr) { errEl.textContent = t("errNameAr"); errEl.style.display="block"; nameArEl.focus(); return; }
  if (!nameEn) { errEl.textContent = t("errNameEn"); errEl.style.display="block"; nameEnEl.focus(); return; }
  if (!/^[A-Za-z0-9 \-_&().]+$/.test(nameEn)) {
    errEl.textContent = t("errNameEnFormat");
    errEl.style.display="block"; nameEnEl.focus(); return;
  }

  if (editingId) {
    // ── وضع التعديل ──────────────────────────────────────
    const isBase = BASE_ASSETS.some(b => b.id === editingId);
    if (isBase) {
      baseOverrides[editingId] = { name_ar: nameAr, name_en: nameEn, icon: selectedIcon };
      // ملاحظة: العملة الأصلية مش بتتغيّر للبنود الأساسية حفاظاً على دقة الحسابات القديمة
    } else {
      const idx = customAssets.findIndex(c => c.id === editingId);
      if (idx !== -1) {
        customAssets[idx] = { ...customAssets[idx], name_ar: nameAr, name_en: nameEn, icon: selectedIcon, currency };
      }
    }
    rebuildAssets();
    modalOpen = false;
    editingId = null;
    render();
    renderBreakdown();
    scheduleSave();
    return;
  }

  // ── وضع الإضافة ────────────────────────────────────────
  let id = slugify(nameEn);
  if (ASSETS.some(a => a.id === id)) {
    let n = 2;
    while (ASSETS.some(a => a.id === id + "-" + n)) n++;
    id = id + "-" + n;
  }

  customAssets.push({ id, name_ar: nameAr, name_en: nameEn, icon: selectedIcon, currency, isAsset: false });
  rebuildAssets();
  order.push(id);

  modalOpen = false;
  render();
  renderBreakdown();
  scheduleSave();
}

// ── حذف بند: أي بند ممكن يتمسح، سواء أصلي أو مضاف ──────
function deleteAsset(id) {
  const a = ASSETS.find(x => x.id === id);
  if (!a) return;
  if (!confirm(t("confirmDelete")(assetName(a)))) return;

  const isBase = BASE_ASSETS.some(b => b.id === id);
  if (isBase) {
    // بند أصلي: بنحط استبعاد بدل ما نمسح تعريفه (عشان لو حد افتح من جهاز تاني يفضل ظاهر إلا لو استبعده هو كمان)
    excludedBaseIds.add(id);
  } else {
    customAssets = customAssets.filter(c => c.id !== id);
  }

  delete qty[id];
  order = order.filter(oid => oid !== id);
  rebuildAssets();

  render();
  renderBreakdown();
  scheduleSave();
}

// ── تبديل تصنيف البند: كاش سائل ⇄ أصل ثابت ──────────────
// التصنيف ده منفصل تماماً عن العملة، عشان أي بند (حتى لو جنيه)
// يقدر يتحط في فئة "أصول" بدل "جنيه مصري" في الـ breakdown والسجل.
function toggleAssetCategory(id) {
  const a = ASSETS.find(x => x.id === id);
  if (!a) return;
  const newValue = !a.isAsset;

  const isBase = BASE_ASSETS.some(b => b.id === id);
  if (isBase) {
    baseOverrides[id] = { ...(baseOverrides[id] || {}), isAsset: newValue };
  } else {
    const idx = customAssets.findIndex(c => c.id === id);
    if (idx !== -1) customAssets[idx] = { ...customAssets[idx], isAsset: newValue };
  }

  rebuildAssets();
  render();
  renderBreakdown();
  scheduleSave();
}

function updateTotals() {
  if (!rates) return;
  let totalUsd = 0;
  ASSETS.forEach(a => {
    const p = priceFor(a);
    const t = qty[a.id] * p;
    totalUsd += t;
    const el = document.getElementById("total-" + a.id);
    if (el) el.textContent = fmtUsd(t);
  });
  const totalGold = rates.goldUsdPerGram > 0 ? totalUsd / rates.goldUsdPerGram : 0;
  const totalEgp  = totalUsd * rates.egpPerUsd;
  const hv = document.getElementById("hero-value");
  const hg = document.getElementById("hero-gold");
  const he = document.getElementById("hero-egp");
  if (hv) hv.textContent = fmtUsd(totalUsd);
  if (hg) hg.textContent = fmtNum(totalGold, 2) + " " + (lang==="en"?"g":"جم");
  if (he) he.textContent = fmtEgp(totalEgp);
}

  const totalEgp    = rates ? totalUsd * rates.egpPerUsd : 0;
  const lastUpdate  = rates ? new Date(rates.fetchedAt).toLocaleTimeString(lang === "en" ? "en-US" : "ar-EG",{hour:"2-digit",minute:"2-digit"}) : "—";
  const orderedAssets = order.map(id => ASSETS.find(a => a.id === id)).filter(Boolean);
  const fxNote = rates && rates.fxSource === "daily" ? t("footerDaily") : t("footerHourly");

  document.getElementById("app").innerHTML = `

// ── Breakdown Charts ────────────────────────────────────
const BK_COLORS = { EGP:"#5fae6e", USD:"#4a8fdb", EUR:"#7bbcdb", SAR:"#c084d6", GOLD:"#d4af37", ASSETS:"#d9695f" };

function pct(val, total) { return total > 0 ? val / total * 100 : 0; }
function fmtPct(n) { return n.toFixed(1) + "%"; }

function renderBreakdown() {
  const root = document.getElementById("wt-bk-root");
  if (!root || !rates) return;

  let egpUsd = 0, hardUsd = {USD:0, EUR:0, SAR:0}, goldUsd = 0, assetsUsd = 0;
  ASSETS.forEach(a => {
    const v = (qty[a.id]||0) * priceFor(a);
    if      (a.isAsset)                                    assetsUsd += v;
    else if (a.currency === "EGP")                         egpUsd += v;
    else if (a.currency === "GOLD")                        goldUsd += v;
    else if (hardUsd[a.currency] !== undefined)            hardUsd[a.currency] += v;
  });

  const hardTotal = hardUsd.USD + hardUsd.EUR + hardUsd.SAR;
  const totalUsd  = egpUsd + hardTotal + goldUsd + assetsUsd;
  const egpP    = pct(egpUsd,    totalUsd);
  const hardP   = pct(hardTotal, totalUsd);
  const goldP   = pct(goldUsd,   totalUsd);
  const assetsP = pct(assetsUsd, totalUsd);
  const usdP  = pct(hardUsd.USD, hardTotal);
  const eurP  = pct(hardUsd.EUR, hardTotal);
  const sarP  = pct(hardUsd.SAR, hardTotal);
  const chartEmpty = getComputedStyle(document.getElementById("bodyRoot")).getPropertyValue("--wt-chart-empty").trim() || "#2a2a2a";

  root.innerHTML = `
  <div class="wt-breakdown">
    <p class="wt-bk-title">${t("bkTitle")}</p>
    <div class="wt-bk-body">
      <div class="wt-bk-donuts">
        <div class="wt-bk-donut-col">
          <span class="wt-bk-donut-lbl">${t("bkOverall")}</span>
          <div class="wt-bk-donut-wrap" style="width:160px;height:160px">
            <canvas id="bk-outer" width="160" height="160"></canvas>
            <div class="wt-bk-center">
              <span class="wt-bk-center-val" id="bk-outer-pct">—</span>
              <span class="wt-bk-center-sub" id="bk-outer-sub">—</span>
            </div>
          </div>
        </div>
        <div class="wt-bk-donut-col">
          <span class="wt-bk-donut-lbl">${t("bkInsideHard")}</span>
          <div class="wt-bk-donut-wrap" style="width:130px;height:130px">
            <canvas id="bk-inner" width="130" height="130"></canvas>
            <div class="wt-bk-center">
              <span class="wt-bk-center-val" id="bk-inner-pct">—</span>
              <span class="wt-bk-center-sub" id="bk-inner-sub">—</span>
            </div>
          </div>
        </div>
      </div>
      <div class="wt-bk-right">
        <div class="wt-bk-leg">
          <p class="wt-bk-leg-title">${t("bkMainCats")}</p>
          <div class="wt-bk-leg-row"><div class="wt-bk-leg-dot" style="background:${BK_COLORS.EGP}"></div><span class="wt-bk-leg-name">${t("bkEgp")}</span><span class="wt-bk-leg-val">${fmtPct(egpP)}</span></div>
          <div class="wt-bk-leg-row"><div class="wt-bk-leg-dot" style="background:#4a8fdb"></div><span class="wt-bk-leg-name">${t("bkHard")}</span><span class="wt-bk-leg-val">${fmtPct(hardP)}</span></div>
          <div class="wt-bk-leg-row"><div class="wt-bk-leg-dot" style="background:${BK_COLORS.GOLD}"></div><span class="wt-bk-leg-name">${t("bkGold")}</span><span class="wt-bk-leg-val">${fmtPct(goldP)}</span></div>
          <div class="wt-bk-leg-row"><div class="wt-bk-leg-dot" style="background:${BK_COLORS.ASSETS}"></div><span class="wt-bk-leg-name">${t("bkAssets")}</span><span class="wt-bk-leg-val">${fmtPct(assetsP)}</span></div>
        </div>
        ${hardTotal > 0 ? `<div class="wt-bk-leg">
          <p class="wt-bk-leg-title">${t("bkHardDetail")}</p>
          <div class="wt-bk-bars">
            ${[{n:t("bkUsd"),v:usdP,c:BK_COLORS.USD},{n:t("bkEur"),v:eurP,c:BK_COLORS.EUR},{n:t("bkSar"),v:sarP,c:BK_COLORS.SAR}]
              .map(b=>`<div class="wt-bk-bar-row">
                <div class="wt-bk-bar-name">${b.n}</div>
                <div class="wt-bk-bar-track"><div class="wt-bk-bar-fill" style="width:${b.v.toFixed(1)}%;background:${b.c}"></div></div>
                <div class="wt-bk-bar-pct">${fmtPct(b.v)}</div>
              </div>`).join("")}
          </div>
        </div>` : ""}
      </div>
    </div>
  </div>`;

  // Outer donut
  if (outerChart) { outerChart.destroy(); outerChart = null; }
  const empty = totalUsd === 0;
  outerChart = new Chart(document.getElementById("bk-outer"), {
    type: "doughnut",
    data: {
      labels: [t("bkEgp"), t("bkHard"), t("bkGold"), t("bkAssets")],
      datasets: [{ data: empty?[1,0,0,0]:[egpP,hardP,goldP,assetsP],
        backgroundColor: empty?[chartEmpty,chartEmpty,chartEmpty,chartEmpty]:[BK_COLORS.EGP,"#4a8fdb",BK_COLORS.GOLD,BK_COLORS.ASSETS],
        borderWidth:0, hoverOffset:4 }]
    },
    options: { responsive:false, cutout:"66%",
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>" "+fmtPct(ctx.parsed)}}} }
  });
  const outerBig = [{n:t("bkEgp"),v:egpP},{n:t("bkHard"),v:hardP},{n:t("bkGold"),v:goldP},{n:t("bkAssets"),v:assetsP}].sort((a,b)=>b.v-a.v)[0];
  document.getElementById("bk-outer-pct").textContent = fmtPct(outerBig.v);
  document.getElementById("bk-outer-sub").textContent = outerBig.n;

  // Inner donut
  if (innerChart) { innerChart.destroy(); innerChart = null; }
  const iEmpty = hardTotal === 0;
  innerChart = new Chart(document.getElementById("bk-inner"), {
    type: "doughnut",
    data: {
      labels: [t("bkUsd"), t("bkEur"), t("bkSar")],
      datasets: [{ data: iEmpty?[1,0,0]:[usdP,eurP,sarP],
        backgroundColor: iEmpty?[chartEmpty,chartEmpty,chartEmpty]:[BK_COLORS.USD,BK_COLORS.EUR,BK_COLORS.SAR],
        borderWidth:0, hoverOffset:4 }]
    },
    options: { responsive:false, cutout:"62%",
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>" "+fmtPct(ctx.parsed)}}} }
  });
  const innerBig = [{n:"USD",v:usdP},{n:"EUR",v:eurP},{n:"SAR",v:sarP}].sort((a,b)=>b.v-a.v)[0];
  document.getElementById("bk-inner-pct").textContent = iEmpty ? "—%" : fmtPct(innerBig.v);
  document.getElementById("bk-inner-sub").textContent = iEmpty ? "—"  : innerBig.n;
}

// إجمالي جرامات الذهب اللي المستخدم داخلها دلوقتي (كل البنود بعملة GOLD)
// بنستخدمها كقيمة افتراضية في مودال اللقطة التاريخية عشان يبقى سهل عليه
function currentGoldGrams() {
  return ASSETS
    .filter(a => a.currency === "GOLD")
    .reduce((s, a) => s + (parseFloat(qty[a.id]) || 0), 0);
}

// فتح بحث جوجل عن سعر الأونصة في نفس اليوم المُختار في المودال
function searchGoldPriceGoogle() {
  const dateEl = document.getElementById("hist-date");
  const date = dateEl ? dateEl.value : "";
  const q = date ? `gold price per ounce on ${date}` : "gold price per ounce";

}

// ── سعر الصرف التاريخي (جنيه/دولار) ─────────────────────
// بيتجاب من الـ backend (APILayer) لحظة ما اليوزر يختار تاريخ،
// وبيتخزن في histRate عشان نستخدمه في تحويل حقول الجنيه لدولار.
function onHistDateChange() {
  const dateEl = document.getElementById("hist-date");
  const date = dateEl ? dateEl.value : "";
  if (!date) return;

  histRate = null;
  histRateStatus = "loading";
  histRateError = "";
  renderHistRateBadge();

  google.script.run
    .withSuccessHandler(function(j) {
      if (j && j.ok) {
        histRate = { egpPerUsd: j.egpPerUsd, date: j.date };
        histRateStatus = "ok";
      } else {
        histRate = null;
        histRateStatus = "error";
        histRateError = (j && j.error) ? t(j.error) : t("histRateFailed");
      }
      renderHistRateBadge();
      updateHistEgpPreview();
      updateHistAssetsPreview();
      updateHistTotalPreview();
    })
    .withFailureHandler(function() {
      histRate = null;
      histRateStatus = "error";
      histRateError = t("connectionError");
      renderHistRateBadge();
      updateHistTotalPreview();
    })
    .getHistoricalRate(date);
}

function renderHistRateBadge() {
  const el = document.getElementById("hist-rate-badge");
  if (!el) return;
  if (histRateStatus === "loading") {
    el.className = "wt-hist-rate-badge loading";
    el.textContent = t("histRateFetching");
  } else if (histRateStatus === "ok" && histRate) {
    el.className = "wt-hist-rate-badge ok";
    el.textContent = t("histRatePrefix") + fmtNum(histRate.egpPerUsd, 2) + t("histRateSuffix");
  } else if (histRateStatus === "error") {
    el.className = "wt-hist-rate-badge error";
    el.textContent = "⚠ " + histRateError;
  } else {
    el.className = "wt-hist-rate-badge";
    el.textContent = "";
  }
}

// تحويل مبلغ بالجنيه لدولار حسب سعر الصرف التاريخي المتاح حالياً
function egpToUsdHist(egpAmount) {
  if (!histRate || !histRate.egpPerUsd) return null;
  return egpAmount / histRate.egpPerUsd;
}

function updateHistEgpPreview() {
  const amtEl  = document.getElementById("hist-egp-amount");
  const prevEl = document.getElementById("hist-egp-preview");
  if (!amtEl || !prevEl) return;
  const amount = parseFloat(amtEl.value) || 0;
  const usd = egpToUsdHist(amount);
  prevEl.innerHTML = usd === null ? t("histPreviewEmpty") : "≈ <b>" + fmtUsd(usd) + "</b>";
}

function updateHistAssetsPreview() {
  const amtEl  = document.getElementById("hist-assets-amount");
  const prevEl = document.getElementById("hist-assets-preview");
  if (!amtEl || !prevEl) return;
  const amount = parseFloat(amtEl.value) || 0;
  const usd = egpToUsdHist(amount);
  prevEl.innerHTML = usd === null ? t("histPreviewEmpty") : "≈ <b>" + fmtUsd(usd) + "</b>";
}

// تحديث القيمة المحسوبة (بالدولار) لحظيًا وهو بيكتب سعر الأونصة/كمية الجرامات
function updateHistGoldPreview() {
  const ozEl    = document.getElementById("hist-gold-oz");
  const gramsEl = document.getElementById("hist-gold-grams");
  const el      = document.getElementById("hist-gold-computed");
  if (!ozEl || !gramsEl || !el) return;
  const oz    = parseFloat(ozEl.value)    || 0;
  const grams = parseFloat(gramsEl.value) || 0;
  const usd   = (oz / OUNCE_TO_GRAM) * grams;
  el.textContent = fmtUsd(usd);
  updateHistTotalPreview();
}

function submitHistoryEntry(ev) {
  ev.preventDefault();
  const dateEl  = document.getElementById("hist-date");
  const errEl   = document.getElementById("hist-error");
  const date    = dateEl.value;

  errEl.style.display = "none";
  if (!date) { errEl.textContent = t("errHistoryDate"); errEl.style.display = "block"; return; }

  const egpAmount    = parseFloat(document.getElementById("hist-egp-amount").value)    || 0;
  const assetsAmount = parseFloat(document.getElementById("hist-assets-amount").value) || 0;
  const hardUsd       = parseFloat(document.getElementById("hist-hard").value) || 0;
  const goldOz        = parseFloat(document.getElementById("hist-gold-oz").value)    || 0;
  const goldGrams     = parseFloat(document.getElementById("hist-gold-grams").value) || 0;
  const goldUsd        = (goldOz / OUNCE_TO_GRAM) * goldGrams;

  // لو المستخدم داخل مبلغ بالجنيه (سواء في الفئة دي أو الأصول) لازم يكون عندنا
  // سعر صرف تاريخي جاهز، وإلا مش هنعرف نحوّله بدقة
  let egpUsd = 0, assetsUsd = 0;
  if (egpAmount > 0 || assetsAmount > 0) {
    if (!histRate || !histRate.egpPerUsd) {
      errEl.textContent = t("errNeedRate");
      errEl.style.display = "block";
      return;
    }
    egpUsd    = egpAmount    / histRate.egpPerUsd;
    assetsUsd = assetsAmount / histRate.egpPerUsd;
  }

  const totalUsd = egpUsd + hardUsd + goldUsd + assetsUsd;

  if (totalUsd === 0) { errEl.textContent = t("errHistoryEmpty"); errEl.style.display = "block"; return; }

  google.script.run
    .withSuccessHandler(function(j) {
      if (j && j.ok) {
        historyModalOpen = false;
        loadHistory(); // إعادة تحميل السجل كامل بعد الإضافة
      } else {
        errEl.textContent = (j && j.error) ? t(j.error) : t("genericError");
        errEl.style.display = "block";
      }
    })
    .withFailureHandler(function() {
      errEl.textContent = t("connectionError");
      errEl.style.display = "block";
    })
    .addManualHistoryEntry(currentUser, { date, totalUsd, egpUsd, hardUsd, goldUsd, assetsUsd }, sessionToken);
}

function loadHistory() {
  if (!currentUser) return;
  google.script.run
    .withSuccessHandler(function(j) {
      if (j && j.ok && Array.isArray(j.history)) {
        historyData = j.history.sort((a, b) => a.date.localeCompare(b.date));
      }
      render();
      renderHistory();
    })
    .withFailureHandler(function(err) {
      console.error("loadHistory:", err);
      renderHistory();
    })
    .loadHistoryForClient(currentUser, sessionToken);
}

// ── إدارة السجل (جدول تفاعلي زي إكسيل: عرض/تعديل/حذف مباشرة) ──
let historyManagerEdits = {}; // { date: {egpUsd, hardUsd, goldUsd, assetsUsd} } — تعديلات على صفوف موجودة، لسه متحفظتش
let historyManagerDrafts = []; // [{ tempId, date, egpUsd, hardUsd, goldUsd, assetsUsd }] — صفوف جديدة (مكررة أو فاضية) لسه متحفظتش
let historyManagerStatus = null; // { ok: true/false, text } — رسالة تأكيد بعد الحفظ، بتختفي لوحدها بعد شوية
let historyManagerFilter = ""; // فلترة الجدول بحث بالتاريخ (زي "2026-06" يعرض شهر يونيو بس)

// تغليف google.script.run بـ Promise عشان نقدر نستخدم await في حفظ عدة صفوف بالتتابع
function callServer(fnName, ...args) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject)
      [fnName](...args);
  });
}

function openHistoryManager() {
  historyManagerOpen = true;
  historyManagerEdits = {};
  historyManagerDrafts = [];
  historyManagerStatus = null;
  historyManagerFilter = "";
  renderHistory();
}

function closeHistoryManager() {
  historyManagerOpen = false;
  historyManagerEdits = {};
  historyManagerDrafts = [];
  historyManagerStatus = null;
  historyManagerFilter = "";
  renderHistory();
}

function deleteHistoryEntryUi(date) {
  if (!confirm(t("confirmDeleteEntry")(date))) return;
  google.script.run
    .withSuccessHandler(function(j) {
      if (j && j.ok) {
        historyData = (j.history || []).sort((a, b) => a.date.localeCompare(b.date));
        delete historyManagerEdits[date];
        render();
        renderHistory();
      }
    })
    .withFailureHandler(function(err) {
      console.error("deleteHistoryEntry:", err);
    })
    .deleteHistoryEntry(currentUser, date, sessionToken);
}

// بتتنادى مع كل تعديل في أي خانة رقمية لصف موجود بالفعل — بتحدّث القيمة في
// الذاكرة وتحدّث إجمالي الصف فورًا من غير إعادة رسم كامل (عشان الفوكس متضيعش)
function onHistCellEdit(date, field, value) {
  const num = parseFloat(value) || 0;
  const original = historyData.find(h => h.date === date) || {};

  if (!historyManagerEdits[date]) {
    historyManagerEdits[date] = {
      egpUsd:    original.egpUsd    || 0,
      hardUsd:   original.hardUsd   || 0,
      goldUsd:   original.goldUsd   || 0,
      assetsUsd: original.assetsUsd || 0,
    };
  }
  historyManagerEdits[date][field] = num;

  const e = historyManagerEdits[date];
  const total = (e.egpUsd||0) + (e.hardUsd||0) + (e.goldUsd||0) + (e.assetsUsd||0);
  const totalEl = document.getElementById("histmgr-total-" + date);
  if (totalEl) totalEl.textContent = fmtUsd(total);

  const row = document.querySelector('tr[data-date="' + date + '"]');
  if (row) row.classList.add("dirty");

  updateHistmgrSaveButton();
}

// ── تكرار صف (موجود أو مسودة) — زي "Duplicate row" في إكسيل ────────────
// بينسخ القيم الأربعة، ويقترح تاريخ اليوم اللي بعد المصدر مباشرة (قابل
// للتعديل طبعًا)، ويضيف الصف الجديد كـ"مسودة" فوق الجدول لحد ما يتحفظ
function duplicateHistoryRow(sourceKey) {
  let source;
  let baseDateStr = "";

  if (sourceKey.indexOf("draft_") === 0) {
    source = historyManagerDrafts.find(d => d.tempId === sourceKey);
    if (source) baseDateStr = source.date;
  } else {
    const edit = historyManagerEdits[sourceKey];
    const original = historyData.find(h => h.date === sourceKey) || {};
    source = edit || original;
    baseDateStr = sourceKey;
  }
  if (!source) return;

  let suggestedDate = "";
  if (baseDateStr && /^\d{4}-\d{2}-\d{2}$/.test(baseDateStr)) {
    suggestedDate = addDaysToDateStr(baseDateStr, 1);
  }

  historyManagerDrafts.push({
    tempId: "draft_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
    date: suggestedDate,
    egpUsd:    source.egpUsd    || 0,
    hardUsd:   source.hardUsd   || 0,
    goldUsd:   source.goldUsd   || 0,
    assetsUsd: source.assetsUsd || 0,
  });

  renderHistory();
}

// ── إضافة صف جديد فاضي تمامًا (زي إدراج صف جديد في إكسيل) ──────────────
function addBlankDraftRow() {
  historyManagerDrafts.push({
    tempId: "draft_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
    date: "", egpUsd: 0, hardUsd: 0, goldUsd: 0, assetsUsd: 0,
  });
  renderHistory();
}

function removeDraftRow(tempId) {
  historyManagerDrafts = historyManagerDrafts.filter(d => d.tempId !== tempId);
  renderHistory();
  updateHistmgrSaveButton();
}

function onDraftDateEdit(tempId, value) {
  const draft = historyManagerDrafts.find(d => d.tempId === tempId);
  if (!draft) return;
  draft.date = value;
  updateHistmgrSaveButton();
}

function onDraftCellEdit(tempId, field, value) {
  const draft = historyManagerDrafts.find(d => d.tempId === tempId);
  if (!draft) return;
  draft[field] = parseFloat(value) || 0;

  const total = (draft.egpUsd||0) + (draft.hardUsd||0) + (draft.goldUsd||0) + (draft.assetsUsd||0);
  const totalEl = document.getElementById("histmgr-total-" + tempId);
  if (totalEl) totalEl.textContent = fmtUsd(total);

  updateHistmgrSaveButton();
}

// بتتنادى مع كل حرف يتكتب في خانة البحث — بتعمل إعادة رسم كامل للجدول
// (لازم عشان الفلترة)، وبعدين ترجّع الفوكس ومكان الكيرسور لخانة البحث
// نفسها فورًا عشان الكتابة تحس إنها مستمرة من غير قطع
function onHistmgrFilterChange(value) {
  historyManagerFilter = value;
  renderHistory();
  const el = document.querySelector(".wt-histmgr-search");
  if (el) {
    el.focus();
    const len = el.value.length;
    el.setSelectionRange(len, len);
  }
}

function updateHistmgrSaveButton() {
  const btn = document.getElementById("histmgr-save-btn");
  if (!btn) return;
  const editCount  = Object.keys(historyManagerEdits).length;
  const draftCount = historyManagerDrafts.filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d.date)).length;
  const count = editCount + draftCount;
  btn.disabled = count === 0;
  btn.textContent = t("saveChanges") + (count > 0 ? " (" + count + ")" : "");
}

// بتحفظ كل الصفوف المعدّلة والمسودات الصالحة بالتتابع، وبعدين تعمل إعادة تحميل كاملة
async function saveAllHistoryEdits() {
  const editDates   = Object.keys(historyManagerEdits);
  const validDrafts = historyManagerDrafts.filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d.date));
  if (editDates.length === 0 && validDrafts.length === 0) return;

  const btn = document.getElementById("histmgr-save-btn");
  if (btn) { btn.disabled = true; btn.textContent = "…"; }

  let successCount = 0;
  let failCount = 0;

  for (const date of editDates) {
    const e = historyManagerEdits[date];
    const totalUsd = (e.egpUsd||0) + (e.hardUsd||0) + (e.goldUsd||0) + (e.assetsUsd||0);
    try {
      const res = await callServer("addManualHistoryEntry", currentUser, {
        date, totalUsd,
        egpUsd: e.egpUsd || 0, hardUsd: e.hardUsd || 0, goldUsd: e.goldUsd || 0, assetsUsd: e.assetsUsd || 0,
      }, sessionToken);
      if (res && res.ok) successCount++; else failCount++;
    } catch (err) {
      failCount++;
      console.error("saveAllHistoryEdits (edit):", date, err);
    }
  }

  for (const d of validDrafts) {
    const totalUsd = (d.egpUsd||0) + (d.hardUsd||0) + (d.goldUsd||0) + (d.assetsUsd||0);
    try {
      const res = await callServer("addManualHistoryEntry", currentUser, {
        date: d.date, totalUsd,
        egpUsd: d.egpUsd || 0, hardUsd: d.hardUsd || 0, goldUsd: d.goldUsd || 0, assetsUsd: d.assetsUsd || 0,
      }, sessionToken);
      if (res && res.ok) successCount++; else failCount++;
    } catch (err) {
      failCount++;
      console.error("saveAllHistoryEdits (draft):", d.date, err);
    }
  }

  historyManagerEdits = {};
  historyManagerDrafts = [];

  historyManagerStatus = failCount === 0
    ? { ok: true,  text: t("historySaveSuccess")(successCount) }
    : { ok: false, text: t("historySavePartialFail")(successCount, failCount) };

  loadHistory(); // إعادة تحميل السجل كامل وتحديث كل الشاشة (بما فيها الجدول لو لسه مفتوح)

  // الرسالة بتختفي لوحدها بعد شوية، من غير ما تحتاج المستخدم يعمل حاجة
  setTimeout(() => {
    historyManagerStatus = null;
    if (historyManagerOpen) renderHistory();
  }, 3500);
}

  return `

            <th>${t("entryEgpLabel")}</th>
            <th>${t("entryHardLabel")}</th>
            <th>${t("entryGoldLabel")}</th>
            <th>${t("entryAssetsLabel")}</th>
            <th>${t("entryTotalLabel")}</th>
            <th></th>
          </tr></thead>
          <tbody>${draftRows}${savedRows}</tbody>
        </table>
      </div>
      <div class="wt-modal-actions">
        <button type="button" class="wt-btn-ghost" onclick="closeHistoryManager()">${t("closeBtn")}</button>
        <button type="button" class="wt-btn" id="histmgr-save-btn" onclick="saveAllHistoryEdits()" ${dirtyCount===0?"disabled":""}>${t("saveChanges")}${dirtyCount>0?" ("+dirtyCount+")":""}</button>
      </div>
    </div>
  </div>`;
}

function setHistoryChartPeriod(period) {
  historyChartPeriod = period;
  renderHistory();
}

// تاريخ بداية الفترة المعروضة في الرسم البياني، بنفس منطق حساب النمو
// عشان الرسم والأرقام يفضلوا متطابقين مع بعض
function getChartPeriodStartDate(period) {
  if (period === "7d")  { const c = getGrowthCandidate(7);  return c ? c.date : null; }
  if (period === "30d") { const c = getGrowthCandidate(30); return c ? c.date : null; }
  if (period === "mtd") {
    const now = new Date();
    const monthStart = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + "-01";
    const c = historyData.find(h => h.date >= monthStart);
    return c ? c.date : null;
  }
  if (period === "ytd") {
    const yearStart = new Date().getFullYear() + "-01-01";
    const c = historyData.find(h => h.date >= yearStart);
    return c ? c.date : null;
  }
  return null; // "all"
}

function renderHistory() {
  const root = document.getElementById("wt-history-root");
  if (!root) return;

  const addBtn = `<button class="wt-btn-add" onclick="openHistoryModal()" title="${t("addHistoryBtn")}">+</button>`;
  const manageBtn = `<button class="wt-btn wt-btn-ghost" style="font-size:12px;padding:6px 10px" onclick="openHistoryManager()">${t("manageHistoryBtn")}</button>`;

  if (!historyData || historyData.length === 0) {
    root.innerHTML = `
    <div class="wt-breakdown">
      <div class="wt-table-head" style="margin-bottom:8px">
        <p class="wt-bk-title" style="margin:0">${t("historyTitle")}</p>
        <div class="wt-actions">${manageBtn}${addBtn}</div>
      </div>
      <p style="color:var(--wt-text-dim);font-size:13px;margin:0">${t("historyEmpty")}</p>
    </div>
    ${historyModalOpen ? renderHistoryModal() : ""}
    ${historyManagerOpen ? renderHistoryManager() : ""}`;
    return;
  }

  root.innerHTML = `
  <div class="wt-breakdown">
    <div class="wt-table-head" style="margin-bottom:8px">
      <p class="wt-bk-title" style="margin:0">${t("historyTitle")}</p>
      <div class="wt-actions">${manageBtn}${addBtn}</div>
    </div>
    <div class="wt-chart-periods">
      <button class="wt-chart-period-btn ${historyChartPeriod==='7d'?'active':''}"  onclick="setHistoryChartPeriod('7d')">${t("chartPeriod7d")}</button>
      <button class="wt-chart-period-btn ${historyChartPeriod==='30d'?'active':''}" onclick="setHistoryChartPeriod('30d')">${t("chartPeriod30d")}</button>
      <button class="wt-chart-period-btn ${historyChartPeriod==='mtd'?'active':''}" onclick="setHistoryChartPeriod('mtd')">${t("chartPeriodMtd")}</button>
      <button class="wt-chart-period-btn ${historyChartPeriod==='ytd'?'active':''}" onclick="setHistoryChartPeriod('ytd')">${t("chartPeriodYtd")}</button>
      <button class="wt-chart-period-btn ${historyChartPeriod==='all'?'active':''}" onclick="setHistoryChartPeriod('all')">${t("chartPeriodAll")}</button>
      <button class="wt-chart-period-btn ${showBenchmark?'active':''}" onclick="toggleBenchmark()" style="margin-inline-start:auto">${t("benchmarkToggle")}</button>
    </div>
    <div style="position:relative;height:220px">
      <canvas id="history-chart"></canvas>
    </div>

    <div id="wt-change-analysis-root" style="margin-top:18px"></div>
  </div>
  ${historyModalOpen ? renderHistoryModal() : ""}
  ${historyManagerOpen ? renderHistoryManager() : ""}`;

  const periodStart = getChartPeriodStartDate(historyChartPeriod);
  let filteredHistory = periodStart ? historyData.filter(h => h.date >= periodStart) : historyData;
  if (filteredHistory.length === 0) filteredHistory = historyData; // fallback لو الفلترة رجّعت فاضية لأي سبب

  const labels = filteredHistory.map(h => h.date);
  const totals = filteredHistory.map(h => h.totalUsd);
  const egpSeries    = filteredHistory.map(h => h.egpUsd);
  const hardSeries   = filteredHistory.map(h => h.hardUsd);
  const goldSeries   = filteredHistory.map(h => h.goldUsd);
  const assetsSeries = filteredHistory.map(h => h.assetsUsd);

  // ── تحليل التغيير: كل فئة اتغيرت بكام في الفترة المختارة ──
  renderChangeAnalysis(filteredHistory);

  // ── الرسم الأساسي: الإجمالي بس، عشان التحركات الحقيقية تبان واضحة ──
  // (لو حطينا خطوط الفئات الأربعة كمان على نفس المقياس، محور Y بيتمدد
  // عشان يستوعب أصغر فئة، فالتحرك الفعلي في الإجمالي بيضيع بصريًا)
  if (historyChart) { historyChart.destroy(); historyChart = null; }
  const ctx = document.getElementById("history-chart");
  const gold = getComputedStyle(document.getElementById("bodyRoot")).getPropertyValue("--wt-gold-light").trim();
  const lineColor = getComputedStyle(document.getElementById("bodyRoot")).getPropertyValue("--wt-text-dim").trim();

  historyChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {
          label: t("historyTotalLabel"),
          data: totals,
          borderColor: gold,
          backgroundColor: "transparent",
          borderWidth: 3,
          pointRadius: 3,
          pointBackgroundColor: gold,
          tension: 0.25,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => " " + ctx.dataset.label + ": " + fmtUsd(ctx.parsed.y) } }
      },
      scales: {
        x: { ticks: { color: lineColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { display: false } },
        y: { ticks: { color: lineColor, callback: v => "$" + v.toLocaleString("en-US") }, grid: { color: "rgba(255,255,255,.06)" } }
      }
    }
  });

  if (showBenchmark) loadAndOverlayBenchmark(labels, totals);
}

// ── مقارنة بمؤشر S&P 500 (اختياري) ──────────────────────
function toggleBenchmark() {
  showBenchmark = !showBenchmark;
  renderHistory();
}

function loadAndOverlayBenchmark(labels, totals) {
  if (!labels || labels.length < 2) return;
  const fromDate = labels[0];
  const toDate   = labels[labels.length - 1];

  google.script.run
    .withSuccessHandler(function(j) {
      if (!j || !j.ok || !historyChart) return;

      const spxByDate = {};
      j.series.forEach(p => { spxByDate[p.date] = p.close; });
      const sortedSpxDates = j.series.map(p => p.date).sort();

      // آخر سعر معروف بتاريخ <= التاريخ المطلوب (carry-forward لأيام إجازات البورصة)
      function closestSpxClose(targetDate) {
        let best = null;
        for (const d of sortedSpxDates) {
          if (d <= targetDate) best = d; else break;
        }
        return best ? spxByDate[best] : null;
      }

      const firstClose = closestSpxClose(labels[0]);
      if (!firstClose) return;
      const scale = totals[0] / firstClose; // تطبيع عشان الخطين يبدأوا من نفس النقطة، والمقارنة تبقى بالنسبة المئوية للنمو

      const benchmarkData = labels.map(dt => {
        const c = closestSpxClose(dt);
        return c ? c * scale : null;
      });

      historyChart.data.datasets = historyChart.data.datasets.filter(ds => ds.label !== t("benchmarkLabel"));
      historyChart.data.datasets.push({
        label: t("benchmarkLabel"),
        data: benchmarkData,
        borderColor: "#9c7a4a",
        backgroundColor: "transparent",
        borderWidth: 2,
        borderDash: [6, 4],
        pointRadius: 0,
        tension: 0.15,
      });
      historyChart.options.plugins.legend.display = true;
      historyChart.options.plugins.legend.position = "bottom";
      historyChart.options.plugins.legend.labels = { color: getComputedStyle(document.getElementById("bodyRoot")).getPropertyValue("--wt-text-dim").trim(), boxWidth: 10, boxHeight: 10, font: { size: 11 }, usePointStyle: true };
      historyChart.update();
    })
    .withFailureHandler(function(err) {
      console.warn("Benchmark fetch failed:", err);
    })
    .fetchBenchmarkSeries(fromDate, toDate);
}

// ── تحليل التغيير: كل فئة اتغيرت بكام دولار وبكام % في الفترة المعروضة ──
// بيقارن أول لقطة وآخر لقطة في الفترة المفلترة، ويرتب الفئات من الأكتر
// تأثير على التغيير للأقل، عشان يبان بوضوح "مين اللي حرّك الرقم"
function renderChangeAnalysis(filteredHistory) {
  const root = document.getElementById("wt-change-analysis-root");
  if (!root) return;

  if (!filteredHistory || filteredHistory.length < 2) {
    root.innerHTML = `<p style="color:var(--wt-text-dim);font-size:12px;margin:0">${t("changeAnalysisEmpty")}</p>`;
    return;
  }

  const start = filteredHistory[0];
  const end   = filteredHistory[filteredHistory.length - 1];

  const rows = [
    { key: "egpUsd",    name: t("bkEgp"),    color: BK_COLORS.EGP },
    { key: "hardUsd",   name: t("bkHard"),   color: "#4a8fdb" },
    { key: "goldUsd",   name: t("bkGold"),   color: BK_COLORS.GOLD },
    { key: "assetsUsd", name: t("bkAssets"), color: BK_COLORS.ASSETS },
  ].map(r => ({ ...r, delta: (end[r.key] || 0) - (start[r.key] || 0) }));

  const maxAbs = Math.max(...rows.map(r => Math.abs(r.delta)), 0.01);
  rows.sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));

  root.innerHTML = `
  <p class="wt-bk-leg-title" style="margin-bottom:10px">${t("changeAnalysisTitle")}</p>
  ${rows.map(r => {
    const up = r.delta >= 0;
    const sign = up ? "+" : "";
    const color = up ? "var(--wt-green)" : "var(--wt-red)";
    const widthPct = (Math.abs(r.delta) / maxAbs) * 100;
    return `<div class="wt-change-row">
      <div class="wt-change-name">${r.name}</div>
      <div class="wt-change-track"><div class="wt-change-fill" style="width:${widthPct.toFixed(1)}%;background:${r.color}"></div></div>
      <div class="wt-change-val" style="color:${color}">${sign}${fmtUsd(r.delta)}</div>
    </div>`;
  }).join("")}`;
}

// ── تشغيل أولي ─────────────────────────────────────────
applyTheme();
applyLang();
attemptAutoLogin(); // بيتحقق من توكن "تذكرني" مع السيرفر، وبيعرض شاشة الدخول أو التطبيق حسب النتيجة
</script>
